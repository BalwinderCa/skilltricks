name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: PHPUnit + PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, intl, gd, zip, pdo_sqlite, redis
          coverage: none

      - name: Prepare environment
        run: |
          cp .env.example .env
          # Tests are database-free; use sqlite so nothing external is required.
          echo "DB_CONNECTION=sqlite" >> .env
          echo "DB_DATABASE=:memory:" >> .env
          echo "APP_ENV=testing" >> .env
          echo "SESSION_DRIVER=array" >> .env

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Generate app key
        run: php artisan key:generate

      - name: Run migrations
        run: php artisan migrate --force

      - name: PHPStan (baseline = only new issues fail)
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=2G

      - name: Composer audit
        run: composer audit --no-ansi --abandoned=ignore

      - name: PHPUnit security suite
        run: vendor/bin/phpunit tests/Feature/Security/

      - name: PHPUnit
        run: vendor/bin/phpunit

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [tests, pint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Execute Remote Deploy Commands over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          port: ${{ secrets.STAGING_SSH_PORT }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          timeout: 120s
          script: |
            echo "==> Deploying to Staging Server"
            cd public_html/staging
            
            echo "==> Enabling Maintenance Mode"
            php artisan down || true
            
            echo "==> Pulling latest code from main"
            git fetch origin main
            git reset --hard origin/main
            
            echo "==> Syncing optimized composer dependencies"
            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist
            
            echo "==> Running database migrations"
            php artisan migrate --force
            
            echo "==> Rebuilding route and template caches"
            php artisan route:cache
            php artisan view:cache
            php artisan config:clear
            
            echo "==> Restarting background queues"
            php artisan queue:restart
            
            echo "==> Lifting Maintenance Mode"
            php artisan up
            
            echo "✓ Staging deployment finished successfully!"


  pint:
    name: Pint (changed files)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --no-scripts

      - name: Pint on changed PHP files
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          if [ -z "$BASE" ]; then BASE="$(git rev-parse HEAD~1 2>/dev/null || true)"; fi
          if [ -z "$BASE" ]; then echo "No base commit to diff against; skipping."; exit 0; fi
          FILES="$(git diff --name-only --diff-filter=ACM "$BASE" HEAD -- '*.php' | tr '\n' ' ')"
          if [ -z "$FILES" ]; then echo "No changed PHP files."; exit 0; fi
          echo "Checking: $FILES"
          vendor/bin/pint --test $FILES
